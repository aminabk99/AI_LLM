<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Local Agent UI</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2b;
      --panel2: #0f172a;
      --text: #e6eaf2;
      --muted: #a7b0c2;
      --accent: #6ea8fe;
      --good: #32d583;
      --bad: #ff5c5c;
      --border: rgba(255,255,255,.10);
      --shadow: 0 10px 25px rgba(0,0,0,.35);
      --radius: 16px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--sans);
      background: radial-gradient(1200px 600px at 20% 10%, rgba(110,168,254,.15), transparent 60%),
                  radial-gradient(900px 500px at 80% 20%, rgba(50,213,131,.12), transparent 55%),
                  var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,16,28,.65);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .brand .title {
      font-weight: 700;
      letter-spacing: .2px;
      font-size: 16px;
    }

    .brand .sub {
      color: var(--muted);
      font-size: 12px;
    }

    .right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      font-family: var(--mono);
      font-size: 12px;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255,255,255,.03);
      max-width: 52vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    button {
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      transition: transform .05s ease, background .15s ease;
    }
    button:hover { background: rgba(255,255,255,.06); }
    button:active { transform: translateY(1px); }
    button.primary { border-color: rgba(110,168,254,.5); }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }

    .app {
      width: min(980px, 100%);
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat {
      flex: 1;
      overflow: auto;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(18,26,43,.55);
      box-shadow: var(--shadow);
    }

    .msg {
      display: flex;
      margin: 10px 0;
      gap: 10px;
      align-items: flex-end;
    }

    .msg.user { justify-content: flex-end; }
    .msg.assistant { justify-content: flex-start; }

    .bubble {
      max-width: min(78%, 720px);
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      line-height: 1.35;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .user .bubble {
      background: rgba(110,168,254,.12);
      border-color: rgba(110,168,254,.30);
    }

    .assistant .bubble {
      background: rgba(255,255,255,.04);
    }

    .meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      font-family: var(--mono);
      opacity: .9;
    }

    .toolbox {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(0,0,0,.18);
      overflow: hidden;
    }

    .toolbox summary {
      cursor: pointer;
      padding: 10px 12px;
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }

    .toolbox summary::-webkit-details-marker { display:none; }

    .toolbox pre {
      margin: 0;
      padding: 10px 12px 12px;
      overflow: auto;
      font-family: var(--mono);
      font-size: 12px;
      color: #d7def0;
      border-top: 1px solid var(--border);
    }

    .composer {
      display: flex;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(18,26,43,.55);
      box-shadow: var(--shadow);
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 44px;
      max-height: 160px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.20);
      color: var(--text);
      outline: none;
      font-size: 14px;
      line-height: 1.35;
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      padding: 0 2px;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
      margin: 0;
    }

    a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
<header>
  <div class="brand">
    <div class="title">Local Agent UI</div>
    <div class="sub">FastAPI /chat + session memory + tools</div>
  </div>

  <div class="right">
    <div class="pill" id="sessionPill">session_id: (loading)</div>
    <button id="newSessionBtn" title="Start a fresh conversation">New session</button>
    <button class="primary" id="pingBtn" title="Quick API check">Ping</button>
  </div>
</header>

<main>
  <div class="app">
    <div class="chat" id="chat"></div>

    <div class="composer">
      <textarea id="input" placeholder="Type a message... (Shift+Enter = new line)"></textarea>
      <div class="row">
        <button class="primary" id="sendBtn">Send</button>
        <div class="status" id="status"></div>
      </div>
    </div>

    <p class="hint">
      Tip: Your <code>session_id</code> is stored locally in the browser so memory works.
      Tools return in <code>tool_result</code>.
    </p>
  </div>
</main>

<script>
  const chatEl = document.getElementById("chat");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const statusEl = document.getElementById("status");
  const sessionPill = document.getElementById("sessionPill");
  const newSessionBtn = document.getElementById("newSessionBtn");
  const pingBtn = document.getElementById("pingBtn");

  const API_CHAT = "/chat";
  const API_HEALTH = "/health";
  const SESSION_KEY = "local_agent_session_id";

  function getSessionId() {
    let sid = localStorage.getItem(SESSION_KEY);
    if (!sid) {
      sid = crypto.randomUUID();
      localStorage.setItem(SESSION_KEY, sid);
    }
    return sid;
  }

  function setSessionId(newId) {
    localStorage.setItem(SESSION_KEY, newId);
    renderSessionId();
  }

  function renderSessionId() {
    const sid = getSessionId();
    sessionPill.textContent = `session_id: ${sid}`;
  }

  function scrollToBottom() {
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, (c) => ({
      "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;"
    }[c]));
  }

  function addMessage(role, text, meta = "", toolResult = null) {
    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = escapeHtml(text || "");

    if (toolResult) {
      const details = document.createElement("details");
      details.className = "toolbox";

      const summary = document.createElement("summary");
      summary.innerHTML = `<span>tool_result</span><span>(click to expand)</span>`;
      details.appendChild(summary);

      const pre = document.createElement("pre");
      pre.textContent = JSON.stringify(toolResult, null, 2);
      details.appendChild(pre);

      bubble.appendChild(details);
    }

    if (meta) {
      const m = document.createElement("div");
      m.className = "meta";
      m.textContent = meta;
      bubble.appendChild(m);
    }

    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    scrollToBottom();
  }

  function setStatus(s) {
    statusEl.textContent = s || "";
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    addMessage("user", text);
    inputEl.value = "";
    setStatus("Thinking...");

    try {
      const payload = {
        message: text,
        session_id: getSessionId()
      };

      const res = await fetch(API_CHAT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json().catch(() => null);

      if (!res.ok) {
        addMessage("assistant", `Error ${res.status}: ${data ? JSON.stringify(data) : "Request failed"}`);
        setStatus("");
        return;
      }

      // Keep session in sync if server returns one (it will)
      if (data.session_id) setSessionId(data.session_id);

      addMessage(
        "assistant",
        data.reply || "",
        `request_id: ${data.request_id || "n/a"}`,
        data.tool_result || null
      );

      setStatus("");
    } catch (e) {
      addMessage("assistant", `Network error: ${e}`);
      setStatus("");
    }
  }

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);

  newSessionBtn.addEventListener("click", () => {
    setSessionId(crypto.randomUUID());
    addMessage("assistant", "New session started. Your memory is now fresh.");
  });

  pingBtn.addEventListener("click", async () => {
    setStatus("Pinging /health...");
    try {
      const res = await fetch(API_HEALTH);
      const data = await res.json();
      addMessage("assistant", `Health: ${JSON.stringify(data)}`);
    } catch (e) {
      addMessage("assistant", `Ping failed: ${e}`);
    } finally {
      setStatus("");
    }
  });

  // Init
  renderSessionId();
  addMessage("assistant", "Hi! This is your local Chat UI. Ask something, or try: “Use the list_files tool to list files under app/.”");
</script>
</body>
</html>
